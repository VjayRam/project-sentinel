global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - rules/classifier.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: classifier
    metrics_path: /metrics/
    scrape_interval: 10s
    static_configs:
      # k8s-internal Service FQDN — only resolves inside the cluster. The
      # docker-compose dev path uses prometheus.compose.yml instead (its
      # target is the compose network's "classifier:8000"), rather than
      # listing both targets here — that would leave one permanently down
      # in every environment and make the ClassifierDown alert fire nonstop.
      - targets: ["classifier.sentinel-app.svc.cluster.local:8000"]
    relabel_configs:
      - target_label: service
        replacement: classifier
