global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - rules/classifier.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: classifier
    metrics_path: /metrics/
    scrape_interval: 10s
    static_configs:
      - targets: ["host.docker.internal:8000"]
    relabel_configs:
      - target_label: service
        replacement: classifier
