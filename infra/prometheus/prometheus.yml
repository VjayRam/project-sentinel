global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - rules/classifier.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: classifier
    # host.k3d.internal resolves to the Docker host from inside k3d pods,
    # allowing Prometheus to scrape the classifier running locally via dev-start.sh.
    # Change to classifier.sentinel-app.svc.cluster.local:8000 when the
    # classifier is deployed into the cluster (Phase 5+).
    metrics_path: /metrics/
    scrape_interval: 10s
    static_configs:
      - targets: ["host.k3d.internal:8000"]
    relabel_configs:
      - target_label: service
        replacement: classifier
