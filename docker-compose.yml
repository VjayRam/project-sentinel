services:
  classifier:
    build: ./services/classifier
    container_name: sentinel-classifier
    ports:
      - "8000:8000"
    volumes:
      # Models and logs are mounted so the auto-detect in _resolve_model_dir() works.
      # uv.lock is mounted so _project_root() can find the workspace root inside the container.
      - ./models:/app/models:ro
      - ./logs:/app/logs:ro
      - ./uv.lock:/app/uv.lock:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.4.1
    container_name: sentinel-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    depends_on:
      - classifier
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.0.2
    container_name: sentinel-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=sentinel
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DATASOURCES_DEFAULT_NAME=Prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
