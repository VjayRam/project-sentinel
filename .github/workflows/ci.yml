name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          pip install pytest httpx fastapi uvicorn pydantic numpy prometheus-client

      - name: Run unit tests
        run: pytest tests/unit -v --tb=short

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Format check
        run: terraform fmt -check -recursive terraform/

      - name: Validate local environment
        working-directory: terraform/environments/local
        run: |
          terraform init -backend=false
          terraform validate

  docker-build:
    name: Docker Build (classifier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/classifier/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
