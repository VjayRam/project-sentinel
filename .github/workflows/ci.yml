name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-caching: true

      # Only dev deps needed — ruff doesn't require any workspace member to be installed.
      - run: uv sync --only-dev

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format
        run: uv run ruff format --check .

  lock-check:
    name: Lockfile up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: uv lock --check
        run: uv lock --check

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-caching: true

      # Sync only the classifier package + root dev deps (pytest, httpx, etc.).
      # This avoids downloading torch/optimum from the optimizer pipeline (~2 GB).
      # Tests mock the Classifier so no model weights or ONNX runtime calls happen.
      - run: uv sync --package sentinel-classifier --dev

      - name: pytest
        run: uv run pytest --tb=short -q
